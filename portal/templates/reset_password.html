<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ComputerReseller Invoices Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">iGamer Corp</div>
    <h2 style="font-size:18px;margin-bottom:6px">Set New Password</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:24px">Choose a strong password — at least 8 characters</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}" style="margin-bottom:16px">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" required minlength="8" autofocus placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm" required minlength="8" placeholder="Repeat password"
               oninput="checkMatch(this)">
        <div id="match-msg" style="font-size:12px;margin-top:4px"></div>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px">Set Password</button>
    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="{{ url_for('auth.login') }}" style="font-size:13px;color:var(--muted)">← Back to login</a>
    </div>
  </div>
  <script>
  function checkMatch(el) {
    const pw = el.form.querySelector('[name=password]').value;
    const msg = document.getElementById('match-msg');
    if (!el.value) { msg.textContent = ''; return; }
    if (el.value === pw) {
      msg.textContent = '✓ Passwords match';
      msg.style.color = '#4ade80';
    } else {
      msg.textContent = '✗ Passwords do not match';
      msg.style.color = '#f87171';
    }
  }
  </script>
</body>
</html>
