<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ComputerReseller Invoices Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">iGamer Corp</div>
    <h2 style="font-size:18px;margin-bottom:6px">Forgot Password</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:24px">Enter your email and we'll send a reset link</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}" style="margin-bottom:16px">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px">Send Reset Link</button>
    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="{{ url_for('auth.login') }}" style="font-size:13px;color:var(--muted)">← Back to login</a>
    </div>
  </div>
</body>
</html>
